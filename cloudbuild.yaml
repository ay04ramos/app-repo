substitutions:
  _REGION: us-central1
  _REPO: helloworld-repo
  _SERVICE: notes-flask
  _API_ID: notes-api
  _GATEWAY_NAME: notes-gw
  _RUNTIME_SA: 722546049889-compute
  _GATEWAY_SA: 722546049889-compute
  _COLLECTION: notes
  _APP_VERSION: v1

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # 0) Unit tests
  - name: 'python:3.11'
    entrypoint: bash
    args:
      - -c
      - |
        set -euxo pipefail
        pip install -r app/requirements.txt pytest
        pytest -q

  # 1) Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/helloworld-repo/notes-flask:latest'
      - .

  # 2) Push the image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/helloworld-repo/notes-flask:latest'

  # 3) Deploy to Cloud Run (private)
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - run
      - deploy
      - 'notes-flask'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/helloworld-repo/notes-flask:latest'
      - '--region=us-central1'
      - '--platform=managed'
      - '--no-allow-unauthenticated'
      - '--service-account=722546049889-compute@developer.gserviceaccount.com'
      - '--set-env-vars=PROJECT_ID=$PROJECT_ID,APP_VERSION=v1,NOTES_COLLECTION=notes'
      - '--port=8080'
      - '--memory=256Mi'
      - '--cpu=1'

  # 4) Get Cloud Run URL and export for later steps
  - name: 'gcr.io/cloud-builders/gcloud'
    id: get-run-url
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        URL=$(gcloud run services describe notes-flask --region=us-central1 --format='value(status.url)')
        echo "CLOUD_RUN_URL=$URL" >> "$BUILDER_OUTPUT/output"
        echo "CLOUD_RUN_AUDIENCE=$URL" >> "$BUILDER_OUTPUT/output"
        echo "Run URL: $URL"

  # 5) Render OpenAPI with backend URL and audience
  - name: 'gcr.io/cloud-builders/gcloud'
    id: render-openapi
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        source "$BUILDER_OUTPUT/output"
        sed \
          -e "s#\${BACKEND_URL}#${CLOUD_RUN_URL}#g" \
          -e "s#\${BACKEND_AUDIENCE}#${CLOUD_RUN_AUDIENCE}#g" \
          -e "s#\${GATEWAY_HOSTNAME}#notes-api.apigateway.$PROJECT_ID.cloud.goog#g" \
          api/openapi.yaml > api/openapi.generated.yaml
        head -n 30 api/openapi.generated.yaml

  # 6) Ensure API exists
  - name: 'gcr.io/cloud-builders/gcloud'
    id: ensure-api
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        gcloud api-gateway apis describe notes-api || gcloud api-gateway apis create notes-api

  # 7) Create a new API config (unique name)
  - name: 'gcr.io/cloud-builders/gcloud'
    id: create-api-config
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        CFG="cfg-$(date +%Y%m%d-%H%M%S)"
        gcloud api-gateway api-configs create "$CFG" \
          --api=notes-api \
          --openapi-spec=api/openapi.generated.yaml \
          --project="$PROJECT_ID"
        echo "API_CONFIG_NAME=$CFG" >> "$BUILDER_OUTPUT/output"

  # 8) Upsert the Gateway in us-central1
  - name: 'gcr.io/cloud-builders/gcloud'
    id: upsert-gateway
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        source "$BUILDER_OUTPUT/output"
        if gcloud api-gateway gateways describe notes-gw --location=us-central1 >/dev/null 2>&1; then
          gcloud api-gateway gateways update notes-gw \
            --api=notes-api \
            --api-config="$API_CONFIG_NAME" \
            --location=us-central1
        else
          gcloud api-gateway gateways create notes-gw \
            --api=notes-api \
            --api-config="$API_CONFIG_NAME" \
            --location=us-central1
        fi

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/helloworld-repo/notes-flask:latest'
